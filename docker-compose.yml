services:
  # Default checkpoint used for both low-level infer and high-level infer_subtask
  # unless SERVER_ARGS / HIGH_LEVEL_SERVER_ARGS are explicitly overridden.
  # This keeps compose-up aligned with the current ALOHA subtask runtime.
  runtime:
    image: lyl472324464/robot:aloha-ros1.0
    depends_on:
      - aloha_ros_nodes
      - ros_master
      - openpi_server
      - openpi_server_high_level
    # build:
    #   context: .
    #   dockerfile: examples/aloha_real/Dockerfile
    command: /bin/bash
    init: true
    tty: true
    network_mode: host
    privileged: true
    volumes:
      - $PWD:/app

  aloha_ros_nodes:
    image: lyl472324464/robot:aloha-ros1.0
    depends_on:
      - ros_master
    # build:
    #   context: .
    #   dockerfile: examples/aloha_real/Dockerfile
    init: true
    tty: true
    network_mode: host
    privileged: true
    volumes:
      - /dev:/dev
      - $PWD/third_party/aloha:/root/interbotix_ws/src/aloha
    command: /bin/bash /root/interbotix_ws/src/aloha/launch/ros_nodes_entrypoint.sh

  ros_master:
    image: ros:noetic-robot
    network_mode: host
    privileged: true
    command:
      - roscore

  openpi_server:
    image: lyl472324464/robot:openpi_server
    build:
      context: .
      dockerfile: scripts/docker/serve_policy.Dockerfile
    command: >-
      /bin/bash -lc
      "uv run scripts/serve_policy.py ${SERVER_ARGS:-policy:checkpoint --policy.config twist_and_static_mixture_full_finetune --policy.dir /app/checkpoints/twist_and_static_mixture_full_finetune/twist_and_static_mixture_full_finetune_20260402_062540/47000}"
    init: true
    tty: true
    network_mode: host
    volumes:
      - $PWD:/app
      - ${OPENPI_DATA_HOME:-~/.cache/openpi}:/openpi_assets
    environment:
      - GIT_LFS_SKIP_SMUDGE=1
      - XLA_PYTHON_CLIENT_PREALLOCATE=false
      - XLA_PYTHON_CLIENT_MEM_FRACTION=${LOW_LEVEL_XLA_MEM_FRACTION:-0.33}
      - SERVER_ARGS
      - OPENPI_DATA_HOME=/openpi_assets
      - IS_DOCKER=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    gpus: all

  openpi_server_high_level:
    image: lyl472324464/robot:openpi_server_high_level
    build:
      context: .
      dockerfile: scripts/docker/serve_policy.Dockerfile
    command: >-
      /bin/bash -lc
      "uv run scripts/serve_policy.py --no-warmup-rtc --no-warmup-non-rtc --port 8001 ${HIGH_LEVEL_SERVER_ARGS:-policy:checkpoint --policy.config twist_and_static_mixture_full_finetune --policy.dir /app/checkpoints/twist_and_static_mixture_full_finetune/twist_and_static_mixture_full_finetune_20260402_062540/10000}"
    init: true
    tty: true
    network_mode: host
    volumes:
      - $PWD:/app
      - ${OPENPI_DATA_HOME:-~/.cache/openpi}:/openpi_assets
    environment:
      - GIT_LFS_SKIP_SMUDGE=1
      - XLA_PYTHON_CLIENT_PREALLOCATE=false
      - XLA_PYTHON_CLIENT_MEM_FRACTION=${HIGH_LEVEL_XLA_MEM_FRACTION:-0.60}
      - HIGH_LEVEL_SERVER_ARGS
      - OPENPI_DATA_HOME=/openpi_assets
      - IS_DOCKER=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    gpus: all

  redis:
    image: redis:7.4.2
    restart: always
    network_mode: "host"
    healthcheck:
      test:  ["CMD", "redis-cli" ,"ping"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 2s
    ports:
      - 6379:6379

  mongo:
    image: mongo:7.0
    restart: always
    network_mode: "host"
    command:
      - mongod
      - --bind_ip
      - 127.0.0.1
      - --port
      - "27017"
    volumes:
      - mongo_data:/data/db

  voice_web_backend:
    image: voice_assistant_web_backend
    build:
      context: .
      dockerfile: voice_assistant_web/backend/Dockerfile
    restart: always
    network_mode: "host"
    privileged: true
    init: true
    tty: true
    volumes:
      - $PWD:/app
      - /dev:/dev
    env_file:
      - ./voice_assistant_web/.env
    environment:
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - MONGO_URI=${MONGO_URI:-mongodb://127.0.0.1:27017}
      - MONGO_DB=${MONGO_DB:-aloha_voice_assistant}
      - MONGO_RUNTIME_CONFIG_COLLECTION=${MONGO_RUNTIME_CONFIG_COLLECTION:-runtime_config}
    depends_on:
      - redis
      - mongo

  voice_web_frontend:
    image: voice_assistant_web_frontend
    build:
      context: .
      dockerfile: voice_assistant_web/frontend/Dockerfile
    restart: always
    network_mode: "host"
    init: true
    tty: true
    depends_on:
      - voice_web_backend

volumes:
  mongo_data:
