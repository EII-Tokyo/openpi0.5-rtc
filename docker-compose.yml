services:
  runtime:
    image: lyl472324464/robot:aloha-ros1.0
    depends_on:
      - aloha_ros_nodes
      - ros_master
      - openpi_server
    # build:
    #   context: .
    #   dockerfile: examples/aloha_real/Dockerfile
    command: /bin/bash
    init: true
    tty: true
    network_mode: host
    privileged: true
    volumes:
      - $PWD:/app

  aloha_ros_nodes:
    image: lyl472324464/robot:aloha-ros1.0
    depends_on:
      - ros_master
    # build:
    #   context: .
    #   dockerfile: examples/aloha_real/Dockerfile
    init: true
    tty: true
    network_mode: host
    privileged: true
    volumes:
      - /dev:/dev
      - $PWD/third_party/aloha:/root/interbotix_ws/src/aloha
    command: roslaunch --wait aloha ros_nodes.launch

  ros_master:
    image: ros:noetic-robot
    network_mode: host
    privileged: true
    command:
      - roscore

  openpi_server:
    image: lyl472324464/robot:openpi_server
    build:
      context: .
      dockerfile: scripts/docker/serve_policy.Dockerfile
    command: >-
      /bin/bash -lc
      "uv run --no-sync scripts/serve_policy.py --no-warmup-subtask ${SERVER_ARGS:-policy:checkpoint --policy.config twist_off_the_bottle_cap --policy.dir /app/checkpoints/20260205/39999}"
    init: true
    tty: true
    network_mode: host
    volumes:
      - $PWD:/app
      - ${OPENPI_DATA_HOME:-~/.cache/openpi}:/openpi_assets
    environment:
      - GIT_LFS_SKIP_SMUDGE=1
      - XLA_PYTHON_CLIENT_PREALLOCATE=false
      - XLA_PYTHON_CLIENT_MEM_FRACTION=0.4
      - SERVER_ARGS
      - OPENPI_DATA_HOME=/openpi_assets
      - IS_DOCKER=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - UV_PROJECT_ENVIRONMENT=/.venv
      - VIRTUAL_ENV=/.venv
      - UV_NO_SYNC=1
      - UV_NO_DEV=1
      - PYTHONPATH=/app/src
    gpus: all

  redis:
    image: redis:7.4.2
    restart: always
    network_mode: "host"
    healthcheck:
      test:  ["CMD", "redis-cli" ,"ping"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 2s

  voice_web_backend:
    image: voice_assistant_web_backend
    build:
      context: .
      dockerfile: voice_assistant_web/backend/Dockerfile
    restart: always
    network_mode: "host"
    privileged: true
    init: true
    tty: true
    volumes:
      - $PWD:/app
      - /dev:/dev
    env_file:
      - ./voice_assistant_web/.env
    environment:
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
    depends_on:
      - redis

  voice_web_frontend:
    image: voice_assistant_web_frontend
    build:
      context: .
      dockerfile: voice_assistant_web/frontend/Dockerfile
    restart: always
    network_mode: "host"
    init: true
    tty: true
    volumes:
      - $PWD/voice_assistant_web/frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - voice_web_backend
