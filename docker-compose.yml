services:
  # Default checkpoints used for low-level infer and high-level infer_subtask
  # unless SERVER_ARGS / HIGH_LEVEL_SERVER_ARGS are explicitly overridden.
  # Host path: ./checkpoints/... must exist (params + assets; train_state not required).
  # Defaults below: b200 triplet 100k LoRA @10000 (override with env vars when needed).
  runtime:
    image: lyl472324464/robot:aloha-ros1.0
    depends_on:
      - aloha_ros_nodes
      - ros_master
      - openpi_server_low_level
      - openpi_server_qwen_high_level
    environment:
      # examples/aloha_real/main.py 默认连本机策略；跨机时在 shell 或 .env 里设置这两项。
      - OPENPI_LOW_LEVEL_HOST=${OPENPI_LOW_LEVEL_HOST:-127.0.0.1}
      - OPENPI_HIGH_LEVEL_HOST=${OPENPI_HIGH_LEVEL_HOST:-127.0.0.1}
      - OPENPI_QWEN_HIGH_LEVEL_HOST=${OPENPI_QWEN_HIGH_LEVEL_HOST:-127.0.0.1}
      - OPENPI_QWEN_HIGH_LEVEL_PORT=${OPENPI_QWEN_HIGH_LEVEL_PORT:-8002}
    env_file:
      - ./.env
    # build:
    #   context: .
    #   dockerfile: examples/aloha_real/Dockerfile
    command: /bin/bash
    init: true
    tty: true
    network_mode: host
    privileged: true
    volumes:
      - $PWD:/app

  aloha_ros_nodes:
    image: lyl472324464/robot:aloha-ros1.0
    depends_on:
      - ros_master
    # build:
    #   context: .
    #   dockerfile: examples/aloha_real/Dockerfile
    init: true
    tty: true
    network_mode: host
    privileged: true
    volumes:
      - /dev:/dev
      - $PWD/third_party/aloha:/root/interbotix_ws/src/aloha
    command: /bin/bash /root/interbotix_ws/src/aloha/launch/ros_nodes_entrypoint.sh

  ros_master:
    image: ros:noetic-robot
    network_mode: host
    privileged: true
    command:
      - roscore

  # Low-level policy server (:8000). Registry image tag remains `openpi_server`.
  openpi_server_low_level:
    image: lyl472324464/robot:openpi_server
    build:
      context: .
      dockerfile: scripts/docker/serve_policy.Dockerfile
    # command: /bin/bash
    command:
      - /bin/bash
      - -lc
      - |
        if [ -n "$$SERVER_ARGS" ]; then
          set -- $$SERVER_ARGS
        else
          set -- policy:checkpoint \
            --policy.config twist_and_static_mixture_full_finetune \
            --policy.dir /app/checkpoints/twist_and_static_mixture_full_finetune/twist_and_static_mixture_full_finetune_vast_20260405_100600/39999
        fi
        uv run --no-sync scripts/serve_policy.py \
          --no-warmup-subtask \
          "$$@"
    init: true
    tty: true
    network_mode: host
    volumes:
      - $PWD:/app
      - ${OPENPI_DATA_HOME:-~/.cache/openpi}:/openpi_assets
    environment:
      - GIT_LFS_SKIP_SMUDGE=1
      - XLA_PYTHON_CLIENT_PREALLOCATE=false
      - XLA_PYTHON_CLIENT_MEM_FRACTION=${LOW_LEVEL_XLA_MEM_FRACTION:-0.33}
      - SERVER_ARGS
      - OPENPI_DATA_HOME=/openpi_assets
      - IS_DOCKER=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      # serve_policy.Dockerfile uses `uv sync --no-install-project`; without sync, openpi is not on sys.path.
      - PYTHONPATH=/app/src
    gpus: all

  # Pi0.5 high-level service (:8001) is intentionally disabled while testing Qwen high-level (:8002).
  # openpi_server_high_level:
  #   image: lyl472324464/robot:openpi_server_high_level
  #   build:
  #     context: .
  #     dockerfile: scripts/docker/serve_policy.Dockerfile
  #   command:
  #     - /bin/bash
  #     - -lc
  #     - |
  #       if [ -n "$$HIGH_LEVEL_SERVER_ARGS" ]; then
  #         set -- $$HIGH_LEVEL_SERVER_ARGS
  #       else
  #         set -- policy:checkpoint \
  #           --policy.config twist_and_static_mixture_full_finetune \
  #           --policy.dir /app/checkpoints/twist_and_static_mixture_full_finetune/twist_and_static_mixture_full_finetune_vast_20260405_100600/39999
  #       fi
  #       uv run --no-sync scripts/serve_policy.py \
  #         --no-warmup-rtc \
  #         --no-warmup-non-rtc \
  #         --port 8001 \
  #         "$$@"
  #   init: true
  #   tty: true
  #   network_mode: host
  #   volumes:
  #     - $PWD:/app
  #     - ${OPENPI_DATA_HOME:-~/.cache/openpi}:/openpi_assets
  #   environment:
  #     - GIT_LFS_SKIP_SMUDGE=1
  #     - XLA_PYTHON_CLIENT_PREALLOCATE=false
  #     - XLA_PYTHON_CLIENT_MEM_FRACTION=${HIGH_LEVEL_XLA_MEM_FRACTION:-0.60}
  #     - HIGH_LEVEL_SERVER_ARGS
  #     - OPENPI_DATA_HOME=/openpi_assets
  #     - IS_DOCKER=true
  #     - NVIDIA_VISIBLE_DEVICES=all
  #     - NVIDIA_DRIVER_CAPABILITIES=all
  #     - PYTHONPATH=/app/src
  #   gpus: all

  openpi_server_qwen_high_level:
    image: lyl472324464/robot:qwen_high_level
    build:
      context: .
      dockerfile: scripts/docker/qwen_high_level.Dockerfile
    command:
      - /bin/bash
      - -lc
      - |
        if [ -n "$$QWEN_HIGH_LEVEL_ARGS" ]; then
          set -- $$QWEN_HIGH_LEVEL_ARGS
        else
          set -- \
            --host 0.0.0.0 \
            --port 8002 \
            --adapter /app/output/qwen35-2b-twist-lora/v3-20260421-091009/checkpoint-797
        fi
        python scripts/serve_qwen_high_level.py "$$@"
    init: true
    tty: true
    network_mode: host
    volumes:
      - $PWD:/app
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - PYTHONPATH=/app/src:/app/packages/openpi-client/src
      - HF_HOME=/root/.cache/huggingface
      - QWEN_HIGH_LEVEL_ARGS
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    gpus: all

  redis:
    image: redis:7.4.2
    restart: always
    network_mode: "host"
    healthcheck:
      test:  ["CMD", "redis-cli" ,"ping"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 2s

  mongo:
    image: mongo:7.0
    restart: always
    network_mode: "host"
    command:
      - mongod
      - --bind_ip
      - 127.0.0.1
      - --port
      - "27017"
    volumes:
      - mongo_data:/data/db

  voice_web_backend:
    image: voice_assistant_web_backend
    build:
      context: .
      dockerfile: voice_assistant_web/backend/Dockerfile
    restart: always
    network_mode: "host"
    privileged: true
    init: true
    tty: true
    volumes:
      - $PWD:/app
      - /dev:/dev
    env_file:
      - ./voice_assistant_web/.env
    environment:
      - REDIS_HOST=${REDIS_HOST:-localhost}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - MONGO_URI=${MONGO_URI:-mongodb://127.0.0.1:27017}
      - MONGO_DB=${MONGO_DB:-aloha_voice_assistant}
      - MONGO_RUNTIME_CONFIG_COLLECTION=${MONGO_RUNTIME_CONFIG_COLLECTION:-runtime_config}
    depends_on:
      - redis
      - mongo
      - ros_master

  voice_web_frontend:
    image: voice_assistant_web_frontend
    build:
      context: .
      dockerfile: voice_assistant_web/frontend/Dockerfile
    restart: always
    network_mode: "host"
    init: true
    tty: true
    # Serve host-built assets so `npm run build` in voice_assistant_web/frontend updates UI without rebuilding this image.
    volumes:
      - $PWD/voice_assistant_web/frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - voice_web_backend

volumes:
  mongo_data:
